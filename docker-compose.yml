services:
  postgres:
    image: postgres:16-alpine
    container_name: marmita-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: marmita_manager
      POSTGRES_USER: marmita_user
      POSTGRES_PASSWORD: marmita_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marmita_user -d marmita_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: marmita-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/marmita_manager
      SPRING_DATASOURCE_USERNAME: marmita_user
      SPRING_DATASOURCE_PASSWORD: marmita_pass
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: marmita-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
